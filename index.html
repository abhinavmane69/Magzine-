<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOGUE: Shweta's Birthday Edition 🌷</title>

<style>
    /* --- FONTS --- */
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap');

    body {
        margin: 0;
        background: #0f0f0f;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        perspective: 2000px;
        font-family: 'Poppins', sans-serif;
        overflow: hidden;
    }

    /* --- MUSIC CONTROL --- */
    #music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        background: linear-gradient(45deg, #ff85a1, #e91e63);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 30px;
        cursor: pointer;
        font-weight: bold;
        box-shadow: 0 4px 15px rgba(233, 30, 99, 0.4);
    }

    /* --- THE BOOK --- */
    .book {
        width: 800px; 
        height: 520px;
        position: relative;
        transform-style: preserve-3d;
    }

    .page {
        width: 400px;
        height: 100%;
        position: absolute;
        top: 0;
        right: 0;
        transform-origin: left;
        transform-style: preserve-3d;
        transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        z-index: 1;
    }

    .front, .back {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        backface-visibility: hidden;
        background: white;
        box-shadow: inset 3px 0 20px rgba(0,0,0,0.15);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .back {
        transform: rotateY(180deg);
        background: #fffafa;
    }

    /* --- IMAGE STYLING --- */
    .img-box {
        width: 100%;
        height: 300px;
        background: #fdfdfd;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom: 1px solid #eee;
    }

    .img-box img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
    }

    /* --- FLIP ACTION --- */
    input { display: none; }
    #p1:checked ~ .p1 { transform: rotateY(-180deg); z-index: 10; }
    #p2:checked ~ .p2 { transform: rotateY(-180deg); z-index: 11; }
    #p3:checked ~ .p3 { transform: rotateY(-180deg); z-index: 12; }

    /* --- TEXT CONTENT --- */
    .content { padding: 30px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; position: relative; }
    h1 { font-family: 'Playfair Display', serif; font-size: 55px; margin: 0; letter-spacing: -3px; }
    h2 { font-family: 'Playfair Display', serif; text-transform: uppercase; font-size: 18px; color: #333; margin: 10px 0; }
    .quote { font-family: 'Dancing Script', cursive; color: #e91e63; font-size: 1.3rem; margin: 10px 0; }

    /* --- TULIP SHAYARI PAGE --- */
    .shayari-page {
        background: linear-gradient(to bottom, #fff0f5, #ffffff) !important;
        border: 10px solid transparent;
        border-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='0' y='15' font-size='15'%3E🌷%3C/text%3E%3C/svg%3E") 30 stretch;
    }
    .shayari-text {
        font-family: 'Dancing Script', cursive;
        font-size: 1.5rem;
        line-height: 1.8;
        color: #444;
        padding: 10px;
    }

    /* --- FLOATING TULIPS ANIMATION --- */
    .tulip-float {
        position: fixed;
        bottom: -50px;
        font-size: 24px;
        pointer-events: none;
        animation: floatUp 4s linear forwards;
        z-index: 2000;
    }
    @keyframes floatUp {
        0% { transform: translateY(0) rotate(0deg); opacity: 1; }
        100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    /* --- COVER --- */
    .cover-front { background: #000; color: white; border-radius: 0 10px 10px 0; }
    .vogue-tag { background: #e91e63; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; display: inline-block; }
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="Manchala Hasee Toh Phasee 128 Kbps.mp3" type="audio/mpeg">
</audio>

<button id="music-btn" onclick="toggleMusic()">🎵 Play Manchala</button>

        </label>
    </div>
